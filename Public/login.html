<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Entrar</title>
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo-area">
        <h1>Bem-vindo</h1>
        <p class="subtitle">Inicie sessão na sua conta</p>
        <div class="divider"></div>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Endereço de email</label>
          <div class="input-wrap">
            <input
              type="email"
              id="email"
              name="email"
              placeholder="exemplo@email.com"
              autocomplete="email"
            />
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
            </svg>
          </div>
          <p class="error-msg" id="emailError">Por favor, introduza um email válido.</p>
        </div>

        <div class="form-group">
          <label for="password">Palavra-passe</label>
          <div class="input-wrap">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••"
              autocomplete="current-password"
            />
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
            </svg>
          </div>
          <p class="error-msg" id="passwordError">A palavra-passe deve ter pelo menos 6 caracteres.</p>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
          Entrar
        </button>
      </form>

      <!-- Success state -->
      <div class="success-overlay" id="successOverlay">
        <div class="success-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" width="24" height="24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
          </svg>
        </div>
        <p class="success-title">Sessão iniciada</p>
        <p class="success-sub">Seja bem-vindo de volta.</p>
      </div>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
