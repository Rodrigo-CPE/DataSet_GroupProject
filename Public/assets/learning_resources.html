<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recursos de Aprendizagem Mais Utilizados</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }
        h1 {
            color: #1a1a1a;
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 28px;
            font-weight: 600;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        #chart {
            min-height: 500px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Recursos de Aprendizagem Mais Utilizados</h1>
        <p class="subtitle">Distribuição dos recursos de aprendizagem mais utilizados pelos desenvolvedores</p>
        <div id="chart"></div>
    </div>

    <script>
        // Dados dos recursos de aprendizagem
        const data = [
            { resource: 'Documentação', count: 41267, percentage: 63.06 },
            { resource: 'Cursos Online', count: 40183, percentage: 61.41 },
            { resource: 'Stack Overflow', count: 39492, percentage: 60.35 },
            { resource: 'Livros Técnicos', count: 33633, percentage: 51.40 },
            { resource: 'YouTube Tutoriais', count: 26668, percentage: 40.75 },
            { resource: 'Podcasts', count: 3955, percentage: 6.04 }
        ];

        // Preparar dados para o Plotly
        const resources = data.map(d => d.resource);
        const counts = data.map(d => d.count);

        const trace = {
            x: counts,
            y: resources,
            type: 'bar',
            orientation: 'h',
            marker: {
                color: '#2563eb',
                line: {
                    color: 'rgb(8,48,107)',
                    width: 1.5
                }
            },
            text: data.map(d => `${d.percentage.toFixed(1)}% (${d.count.toLocaleString('pt-PT')})`),
            textposition: 'outside',
            hovertemplate: '<b>%{y}</b><br>Utilizações: %{x:,}<extra></extra>'
        };

        const layout = {
            title: {
                text: '',
                x: 0,
                xanchor: 'left',
                font: { size: 20, color: '#1a1a1a' }
            },
            xaxis: {
                title: 'Número de Utilizações',
                gridcolor: '#e0e0e0',
                zeroline: false,
                showgrid: true
            },
            yaxis: {
                title: '',
                autorange: 'reversed'
            },
            plot_bgcolor: '#fafafa',
            paper_bgcolor: 'white',
            margin: { l: 150, r: 50, t: 20, b: 60 },
            font: { family: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto' },
            hovermode: 'closest'
        };

        const config = {
            responsive: true,
            displayModeBar: true,
            displaylogo: false,
            modeBarButtonsToRemove: ['lasso2d', 'select2d']
        };

        Plotly.newPlot('chart', [trace], layout, config);

        // Responsividade
        window.addEventListener('resize', function() {
            Plotly.Plots.resize('chart');
        });
    </script>
</body>
</html>
