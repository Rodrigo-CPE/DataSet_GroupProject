<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Demographics Stats</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            height: auto;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            padding: 12px;
        }

        .stat-card {
            border-radius: 12px;
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            justify-content: flex-start;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }

        .stat-label {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-value {
            font-size: 30px;
            font-weight: 700;
            line-height: 1;
        }

        /* Blue */
        .card-blue {
            background: linear-gradient(135deg, #e0f2fe, #f0f9ff);
            border: 1px solid #bae6fd;
            color: #0369a1;
        }

        /* Green */
        .card-green {
            background: linear-gradient(135deg, #e0f2e9, #f0fdf4);
            border: 1px solid #bbf7d0;
            color: #166534;
        }

        /* Purple */
        .card-purple {
            background: linear-gradient(135deg, #ede9fe, #f5f3ff);
            border: 1px solid #ddd6fe;
            color: #6d28d9;
        }

        /* Yellow */
        .card-yellow {
            background: linear-gradient(135deg, #fef3e2, #fefce8);
            border: 1px solid #fde68a;
            color: #92400e;
        }
    </style>
</head>
<body>
    <div class="stats-grid">
        <div class="stat-card card-blue">
            <div class="stat-label"><i class="fas fa-users"></i> Idade Média</div>
            <div class="stat-value">33 anos</div>
        </div>
        <div class="stat-card card-green">
            <div class="stat-label"><i class="fas fa-globe"></i> Países</div>
            <div class="stat-value">185</div>
        </div>
        <div class="stat-card card-purple">
            <div class="stat-label"><i class="fas fa-graduation-cap"></i> Com Diploma</div>
            <div class="stat-value">80.9%</div>
        </div>
        <div class="stat-card card-yellow">
            <div class="stat-label"><i class="fas fa-briefcase"></i> Tempo Inteiro</div>
            <div class="stat-value">80.6%</div>
        </div>
    </div>
</body>
</html>
