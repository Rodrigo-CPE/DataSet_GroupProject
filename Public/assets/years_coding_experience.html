<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Years of Coding Experience</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #ffffff;
        }
        
        .container {
            width: 100%;
            margin: 0;
        }
        
        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a;
            margin: 0 0 8px 0;
            text-align: left;
        }
        
        .subtitle {
            color: #666;
            font-size: 13px;
            margin-bottom: 20px;
        }
        
        #chart {
            width: 100%;
            height: 450px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Anos de Experiência em Programação</h1>
        <p class="subtitle">Distribuição da experiência profissional em programação</p>
        <div id="chart"></div>
    </div>
    
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script>
        const yearsData = [
            { label: 'Menos de 1 ano', value: 4.4 },
            { label: '1-2 anos', value: 10.4 },
            { label: '3-5 anos', value: 11.7 },
            { label: '6-10 anos', value: 13.2 },
            { label: '11-15 anos', value: 8.5 },
            { label: '16-20 anos', value: 5.6 },
            { label: '20+ anos', value: 8.5 }
        ];

        // Sort by descending value
        yearsData.sort((a, b) => b.value - a.value);

        const labels = yearsData.map(d => d.label);
        const values = yearsData.map(d => d.value);

        const data = [{
            y: labels,
            x: values,
            type: 'bar',
            orientation: 'h',
            marker: {
                color: '#22c55e',
                line: { color: '#22c55e', width: 0 }
            },
            text: values.map(v => v.toFixed(1) + '%'),
            textposition: 'outside',
            textfont: { size: 11, color: '#22c55e', family: 'Segoe UI, sans-serif' },
            hovertemplate: '<b>%{y}</b><br>%{x:.1f}%<extra></extra>'
        }];

        const layout = {
            title: '',
            paper_bgcolor: '#ffffff',
            plot_bgcolor: '#ffffff',
            showlegend: false,
            height: 500,
            font: { family: 'Segoe UI, sans-serif', size: 11, color: '#1f2937' },
            margin: { l: 180, r: 100, t: 10, b: 50 },
            xaxis: {
                showgrid: true,
                gridwidth: 1,
                gridcolor: '#e5e7eb',
                zeroline: false,
                range: [0, 20]
            },
            yaxis: {
                autorange: 'reversed'
            }
        };

        Plotly.newPlot('chart', data, layout, { staticPlot: false, displayModeBar: false });
        
        window.addEventListener('resize', () => {
            Plotly.Plots.resize('chart');
        });
    </script>
</body>
</html>
