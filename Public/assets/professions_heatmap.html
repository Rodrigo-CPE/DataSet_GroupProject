<!DOCTYPE html>
<html>
<head><meta charset="utf-8" /></head>
<body>
    <div id="chart" style="width:100%;height:100%;"></div>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script>
        const professions = ['Full-Stack Dev', 'Database Admin', 'Platform Eng', 'QA Lead', 'Blockchain Dev', 'ML Engineer', 'Security Engineer', 'Tech Lead', 'Product Manager', 'DevOps Engineer', 'Cloud Architect', 'Senior Developer', 'Solution Architect', 'Data Scientist', 'Engineering Manager'];
        const experience_levels = ['Junior', 'Mid', 'Senior', 'Lead', 'Staff'];
        
        const z_data = [
            [48000, 68000, 83000, 93000, 98000],
            [50000, 70000, 85000, 95000, 100000],
            [52000, 72000, 87000, 97000, 102000],
            [54000, 74000, 89000, 99000, 104000],
            [56000, 76000, 91000, 101000, 106000],
            [58000, 78000, 93000, 103000, 108000],
            [60000, 80000, 95000, 105000, 109875],
            [62000, 82000, 98000, 108000, 112560],
            [65000, 85000, 100000, 110000, 115200],
            [68000, 88000, 105000, 115000, 118340],
            [70000, 90000, 110000, 125000, 125890],
            [72000, 92000, 112000, 128000, 128670],
            [75000, 95000, 115000, 130000, 138445],
            [78000, 98000, 118000, 135000, 143480],
            [85000, 105000, 128670, 145000, 158925]
        ];

        const data = [{
            z: z_data,
            x: experience_levels,
            y: professions,
            type: 'heatmap',
            colorscale: [
                [0, '#fee2e2'],
                [0.25, '#fecaca'],
                [0.5, '#fbbf24'],
                [0.75, '#fcd34d'],
                [1, '#22c55e']
            ],
            text: z_data.map(row => row.map(val => '€' + (val/1000).toFixed(0) + 'k')),
            texttemplate: '%{text}',
            textfont: { size: 11, color: '#1e293b' },
            hovertemplate: '<b>%{y}</b> - %{x}<br>€%{z:,.0f}<extra></extra>',
            colorbar: {
                title: 'Salário EUR',
                thickness: 15,
                len: 0.7,
                tickformat: ',.0f'
            }
        }];

        const layout = {
            title: {
                text: '<b>Salário por Profissão & Experiência</b>',
                font: { size: 18, color: '#1f2937', family: 'Segoe UI, sans-serif' },
                x: 0,
                xanchor: 'left'
            },
            xaxis: {
                title: 'Nível de Experiência',
                titlefont: { size: 12, color: '#475569' },
                tickfont: { size: 11, color: '#64748b' }
            },
            yaxis: {
                title: 'Profissão',
                titlefont: { size: 12, color: '#475569' },
                tickfont: { size: 10, color: '#64748b' }
            },
            paper_bgcolor: '#ffffff',
            plot_bgcolor: '#ffffff',
            width: null,
            height: 590,
            margin: { l: 140, r: 100, t: 80, b: 60 }
        };

        Plotly.newPlot('chart', data, layout, {responsive: true, displayModeBar: false});
    </script>
</body>
</html>
