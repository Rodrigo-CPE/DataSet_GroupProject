<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <title>Dashdark — Demographics</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="sidebar" id="sidebar">
  <h2 class="logo">Dashdark</h2>
  <ul class="menu">
    <li data-section="overview" onclick="setActive(this); location.href='/developer'"><i class="fa-solid fa-bars-staggered"></i> <span>Overview</span></li>
    <li data-section="tech-trends" onclick="setActive(this); location.href='/developer/tech-trends'"><i class="fa-solid fa-arrow-trend-up"></i> <span>Tech Trends</span></li>
    <li data-section="career-paths" onclick="setActive(this); location.href='/developer/career-paths'"><i class="fa-solid fa-briefcase"></i> <span>Career Paths</span></li>
    <li data-section="ai-tools" onclick="setActive(this); location.href='/developer/ai-tools'"><i class="fa-solid fa-robot"></i> <span>AI & Tools</span></li>
    <li data-section="learning" onclick="setActive(this); location.href='/developer/learning'"><i class="fa-solid fa-graduation-cap"></i> <span>Learning</span></li>
    <li data-section="salary-explorer" onclick="setActive(this); location.href='/developer/salary-explorer'"><i class="fa-solid fa-dollar-sign"></i> <span>Salary Explorer</span></li>
    <li data-section="demographics" onclick="setActive(this); location.href='/developer/demographics'"><i class="fa-solid fa-user-group"></i> <span>Demographics</span></li>
  </ul>
</div>
<div class="main">
  <div class="topbar">
    <div class="topbar-text">
      <strong>Stack Overflow Developer Survey 2024</strong>
      <span>Comprehensive analysis of 89,184 developer responses worldwide</span>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()">
      <i id="themeIcon" class="fa-solid fa-moon"></i>
    </button>
  </div>
  <div class="content">
    <header class="header">
      <h2>Demographics</h2>
      <div class="page-subtitle">Entendendo a composição da comunidade global de desenvolvedores</div>
    </header>
    <section class="charts">
      <div class="chart-box"><iframe src="/assets/demographics_stats.html" style="width:100%;height:130px;border:none;border-radius:12px;"></iframe></div>
    </section>
    <section class="charts">
      <div class="chart-box"><iframe src="/assets/generational_distribution.html" style="width:100%;height:600px;border:none;border-radius:12px;"></iframe></div>
    </section>
    <section class="charts-grid">
      <div class="chart-box"><iframe src="/assets/years_coding_experience.html" style="width:100%;height:600px;border:none;border-radius:12px;"></iframe></div>
      <div class="chart-box"><iframe src="/assets/employment_status.html" style="width:100%;height:600px;border:none;border-radius:12px;"></iframe></div>
    </section>
    <section class="charts">
      <div class="chart-box"><iframe src="/assets/top_countries.html" style="width:100%;height:600px;border:none;border-radius:12px;"></iframe></div>
    </section>
  </div>
</div>
<script src="/js/script.js"></script>
</body>
</html>
